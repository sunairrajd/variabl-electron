name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Needed to upload release assets

jobs:
  create_release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} --title "Release ${{ github.ref_name }}" --notes "Automated release" --draft || echo "Release already exists"

  build:
    needs: [create_release]
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # BUILD STEP (Do NOT publish yet!)
      - name: Build Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run dist -- --publish never

      # ==========================================
      # WINDOWS SPECIFIC: SIGNING
      # ==========================================
      - name: Find EXEs to Sign
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $unpacked = Get-ChildItem -Recurse dist -Filter "*.exe" | Where-Object { $_.FullName -match "win-unpacked" } | Select-Object -First 1
          $installer = Get-ChildItem -Recurse dist -Filter "*Setup*.exe" | Select-Object -First 1
          
          if (-not $unpacked -or -not $installer) {
            throw "Could not find unpacked exe or installer."
          }
          
          "UNPACKED_PATH=$($unpacked.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_PATH=$($installer.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "UNPACKED_DIR=$($unpacked.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_DIR=$($installer.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign Unpacked Executable
        if: runner.os == 'Windows'
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: 'sign'
          username: ${{ secrets.SSLCOM_USERNAME }}
          password: ${{ secrets.SSLCOM_PASSWORD }}
          credential_id: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSLCOM_TOTP_SECRET }}
          file_path: ${{ env.UNPACKED_PATH }}
          output_path: ${{ env.UNPACKED_DIR }}/signed

      - name: Replace Unpacked Executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path "${{ env.UNPACKED_DIR }}/signed/*" -Destination "${{ env.UNPACKED_DIR }}" -Force

      - name: Sign Installer
        if: runner.os == 'Windows'
        uses: sslcom/esigner-codesign@v1.3.2
        with:
          command: 'sign'
          username: ${{ secrets.SSLCOM_USERNAME }}
          password: ${{ secrets.SSLCOM_PASSWORD }}
          credential_id: ${{ secrets.SSLCOM_CREDENTIAL_ID }}
          totp_secret: ${{ secrets.SSLCOM_TOTP_SECRET }}
          file_path: ${{ env.INSTALLER_PATH }}
          output_path: ${{ env.INSTALLER_DIR }}/signed

      - name: Replace Installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item -Path "${{ env.INSTALLER_DIR }}/signed/*" -Destination "${{ env.INSTALLER_DIR }}" -Force

      # ==========================================
      # PUBLISH TO GITHUB RELEASES
      # ==========================================
      - name: Upload Release Assets (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
         # Upload DMG and auto-updater files (macOS doesn't build a zip in your config)
          gh release upload ${{ github.ref_name }} dist/*.dmg dist/latest-mac.yml dist/*.blockmap --clobber
          
      - name: Upload Release Assets (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload Signed Setup EXE and auto-updater yml files
          # Note: We don't upload win-unpacked, just the installer
          gh release upload ${{ github.ref_name }} "dist/*Setup*.exe" dist/latest.yml dist/*.blockmap --clobber
