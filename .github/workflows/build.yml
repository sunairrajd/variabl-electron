name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Needed to upload release assets

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # BUILD STEP (Do NOT publish yet!)
      - name: Build Application
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run dist -- --publish never

      # ==========================================
      # WINDOWS SPECIFIC: SIGNING
      # ==========================================
      - name: Install .NET (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install SSL.com CodeSignTool (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global SSLCom.CodeSignTool
          $toolPath = Join-Path $env:USERPROFILE ".dotnet\tools"
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sign Windows Executables
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Find both the unpacked executable and the setup installer
          $filesToSign = Get-ChildItem -Recurse dist -Filter "*.exe" | Where-Object { 
            $_.FullName -match "win-unpacked" -or $_.Name -match "Setup" 
          }

          if (-not $filesToSign) {
            throw "No EXEs found to sign."
          }

          foreach ($file in $filesToSign) {
            Write-Host "Signing $($file.FullName)..."
            CodeSignTool sign `
              -input_file_path "$($file.FullName)" `
              -username "${{ secrets.SSLCOM_USERNAME }}" `
              -password "${{ secrets.SSLCOM_PASSWORD }}" `
              -credential_id "${{ secrets.SSLCOM_CREDENTIAL_ID }}" `
              -totp_secret "${{ secrets.SSLCOM_TOTP_SECRET }}"
              
            Write-Host "Verifying signature..."
            Get-AuthenticodeSignature "$($file.FullName)"
          }

      # ==========================================
      # PUBLISH TO GITHUB RELEASES
      # ==========================================
      - name: Upload Release Assets (macOS)
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
         # Upload DMG and auto-updater files (macOS doesn't build a zip in your config)
          gh release upload ${{ github.ref_name }} dist/*.dmg dist/latest-mac.yml dist/*.blockmap --clobber
          
      - name: Upload Release Assets (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload Signed Setup EXE and auto-updater yml files
          # Note: We don't upload win-unpacked, just the installer
          gh release upload ${{ github.ref_name }} "dist/*Setup*.exe" dist/latest.yml dist/*.blockmap --clobber
